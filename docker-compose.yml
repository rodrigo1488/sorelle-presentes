services:
  db:
    image: postgres:15-alpine
    container_name: sorelle-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sorelle
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sorelle"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sorelle-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sorelle
      JWT_SECRET: altere-esta-chave-secreta-em-producao
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      CORS_ORIGIN: http://localhost
      ADMIN_EMAIL: admin@sorelle.com.br
      ADMIN_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm run db:seed && npm start"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sorelle-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
