# Stack completa: PostgreSQL + API + frontend (build React) + Nginx gateway
#
# Produção (www.sorellepresentes.com.br):
#   cp .env.docker.example .env.docker
#   docker compose --env-file .env.docker up -d --build
#
# DNS:
#   sorellepresentes.com.br      → A → IP do servidor
#   www.sorellepresentes.com.br  → A → IP do servidor
#   api.sorellepresentes.com.br → A → IP (opcional, subdomínio da API)

services:
  db:
    image: postgres:15-alpine
    container_name: sorelle-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: sorelle
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sorelle"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sorelle

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sorelle-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/sorelle
      DOCKER_DB_HOST: db
      JWT_SECRET: ${JWT_SECRET:-altere-esta-chave-secreta-em-producao}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-https://www.sorellepresentes.com.br}
      FRONTEND_URL: ${FRONTEND_URL:-https://www.sorellepresentes.com.br}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://www.sorellepresentes.com.br}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@sorelle.com.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CHECKOUT_PAYMENT_METHOD: ${CHECKOUT_PAYMENT_METHOD:-test}
      CORREIOS_FALLBACK: ${CORREIOS_FALLBACK:-estimate}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm run db:seed && npm start"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sorelle

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: sorelle-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sorelle

  gateway:
    image: nginx:stable-alpine
    container_name: sorelle-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - sorelle

volumes:
  postgres_data:
  backend_uploads:

networks:
  sorelle:
    driver: bridge
