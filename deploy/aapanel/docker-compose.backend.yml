# Backend + PostgreSQL em Docker (frontend: build estático + Nginx manual no aaPanel)
# Uso: bash deploy/aapanel/install-docker.sh
#
# DATABASE_URL em server/.env usa 127.0.0.1 (host VPS). Dentro do Docker vira "db" via entrypoint.

services:
  db:
    image: postgres:15-alpine
    container_name: sorelle-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: sorelle
    volumes:
      - sorelle_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sorelle"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../server
      dockerfile: Dockerfile
    container_name: sorelle-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - ../../server/.env
    environment:
      DOCKER_DB_HOST: db
    volumes:
      - sorelle_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm run db:seed && npm start"

volumes:
  sorelle_pg_data:
  sorelle_uploads:
