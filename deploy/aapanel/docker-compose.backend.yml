# Alternativa: só banco + API em Docker (Nginx do aaPanel serve o frontend estático)
# Uso: docker compose -f deploy/aapanel/docker-compose.backend.yml up -d --build
#
# Depois configure server/.env com:
#   DATABASE_URL=postgresql://postgres:SENHA@127.0.0.1:5432/sorelle

services:
  db:
    image: postgres:15-alpine
    container_name: sorelle-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: sorelle
    volumes:
      - sorelle_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sorelle"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../server
      dockerfile: Dockerfile
    container_name: sorelle-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - ../../server/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/sorelle
    volumes:
      - sorelle_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm run db:seed && npm start"

volumes:
  sorelle_pg_data:
  sorelle_uploads:
